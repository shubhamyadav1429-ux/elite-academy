<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Select Standard - Elite Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Albert+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .standard-card {
            background: var(--primary-bg);
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .standard-card:hover {
            border-color: var(--brand-blue);
            background: rgba(37, 99, 235, 0.05);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(37, 99, 235, 0.1);
            color: var(--brand-blue);
        }

        #standardsContainer {
            margin-top: 1.5rem;
        }
    </style>
</head>

<body class="auth-body">
    <div class="form-container">
        <h2>Select Standard 📚</h2>
        <p style="text-align: center; color: var(--text-gray); margin-bottom: 1rem;">Choose your learning path for this
            session</p>
        <div id="error" class="error-msg"></div>

        <div id="standardsContainer">
            <p style="text-align: center;">Loading standards...</p>
        </div>

        <div style="text-align:center; margin-top:2rem;">
            <a href="#" onclick="logout(); return false;" style="font-size:0.9rem; color:var(--text-gray);">Logout</a>
        </div>
    </div>

    <script src="/js/main.js"></script>
    <script>
        checkAuth();
        if (role !== 'student') {
            window.location.href = '/admin-dashboard.html';
        }

        async function loadStandards() {
            try {
                const res = await fetch('/api/public/standards');
                const data = await res.json();

                const container = document.getElementById('standardsContainer');
                container.innerHTML = '';

                if (data.success && data.data && data.data.length > 0) {
                    data.data.forEach(std => {
                        const div = document.createElement('div');
                        div.className = 'standard-card';
                        div.innerHTML = `<span>🎓</span> ${std.name}`;
                        div.onclick = () => {
                            window.location.href = '/dashboard.html?std=' + std._id;
                        };
                        container.appendChild(div);
                    });
                } else {
                    container.innerHTML = '<p style="text-align:center; color:red;">No standards found.</p>';
                }
            } catch (err) {
                document.getElementById('error').innerText = 'Error loading standards';
            }
        }

        loadStandards();
    </script>
</body>

</html>
