<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - Elite Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Albert+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* Student Dashboard Specific Styles */
        .welcome-banner {
            background: linear-gradient(135deg, var(--brand-blue) 0%, var(--accent-purple) 100%);
            border-radius: 20px;
            padding: 3rem;
            color: white;
            margin-bottom: 2rem;
            box-shadow: 0 15px 30px rgba(37, 99, 235, 0.2);
            position: relative;
            overflow: hidden;
        }

        .welcome-banner h2 {
            color: white !important;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .welcome-banner p {
            font-size: 1.1rem;
            opacity: 0.9;
            margin: 0;
        }

        .welcome-banner::after {
            content: '';
            position: absolute;
            right: -5%;
            bottom: -20%;
            width: 300px;
            height: 300px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        .student-subject-card {
            background: white;
            padding: 2.5rem 2rem;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.03);
            transition: transform 0.3s, box-shadow 0.3s;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .student-subject-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
        }

        .subject-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: inline-block;
        }

        .card-gradient-top {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, var(--brand-blue), var(--accent-purple));
        }

        .chapter-card {
            display: flex;
            align-items: center;
            background: white;
            padding: 1.5rem;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02);
            margin-bottom: 1rem;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .chapter-card:hover {
            border-color: var(--brand-blue);
            transform: translateX(5px);
        }

        .chapter-number {
            width: 50px;
            height: 50px;
            background: var(--primary-bg);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: var(--brand-blue);
            font-size: 1.2rem;
            margin-right: 1.5rem;
        }

        .content-section {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            margin-bottom: 2rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            border: 1px solid var(--border);
        }

        .content-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .content-header h4 {
            font-size: 1.4rem;
            color: var(--text-dark);
            margin: 0;
        }

        .content-icon {
            font-size: 1.8rem;
        }

        .fancy-test-btn {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
            display: inline-block;
            margin-top: 1rem;
        }

        .fancy-test-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(16, 185, 129, 0.4);
            color: white;
        }

        .back-nav {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-gray);
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 2rem;
            transition: color 0.3s;
        }

        .back-nav:hover {
            color: var(--brand-blue);
        }

        .test-option {
            display: block;
            padding: 1rem 1.5rem;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            margin-bottom: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .test-option:hover {
            background: var(--primary-bg);
            border-color: var(--brand-blue);
        }

        .test-option input {
            margin-right: 1rem;
            transform: scale(1.2);
        }

        /* Video thumbnail card */
        .video-thumb-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .video-thumb-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.12);
        }

        .video-thumb-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            overflow: hidden;
        }

        .video-thumb-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: opacity 0.3s;
        }

        .video-thumb-wrap:hover img {
            opacity: 0.75;
        }

        .play-btn-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 64px;
            height: 64px;
            background: rgba(255,255,255,0.95);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.35);
            transition: transform 0.2s, background 0.2s;
            pointer-events: none;
        }

        .video-thumb-wrap:hover .play-btn-overlay {
            transform: translate(-50%, -50%) scale(1.12);
            background: #ff0000;
        }

        .play-btn-overlay svg {
            width: 26px;
            height: 26px;
            fill: #ff0000;
            margin-left: 4px;
            transition: fill 0.2s;
        }

        .video-thumb-wrap:hover .play-btn-overlay svg {
            fill: white;
        }

        .video-thumb-info {
            padding: 1rem 1.2rem;
        }

        .video-thumb-info h5 {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-dark);
            margin: 0 0 0.3rem 0;
        }

        .video-thumb-info span {
            font-size: 0.82rem;
            color: var(--text-gray);
        }

        /* Quiz result review styles */
        .question-block.correct-block {
            background: #f0fdf4;
            border: 2px solid #22c55e;
            border-radius: 16px;
            padding: 1.2rem 1.5rem;
        }

        .question-block.wrong-block {
            background: #fff1f2;
            border: 2px solid #f43f5e;
            border-radius: 16px;
            padding: 1.2rem 1.5rem;
        }

        .result-option {
            display: block;
            padding: 0.8rem 1.2rem;
            border-radius: 10px;
            margin-bottom: 0.6rem;
            font-weight: 500;
            border: 1.5px solid transparent;
        }

        .result-option.correct-answer {
            background: #dcfce7;
            border-color: #22c55e;
            color: #15803d;
            font-weight: 700;
        }

        .result-option.wrong-answer {
            background: #ffe4e6;
            border-color: #f43f5e;
            color: #be123c;
            font-weight: 700;
            text-decoration: line-through;
        }

        .result-option.neutral {
            background: var(--primary-bg);
            border-color: var(--border);
            color: var(--text-gray);
        }

        .q-status-badge {
            display: inline-block;
            padding: 0.3rem 0.9rem;
            border-radius: 999px;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 0.8rem;
        }

        .badge-correct { background: #22c55e; color: white; }
        .badge-wrong   { background: #f43f5e; color: white; }

        .score-card {
            background: linear-gradient(135deg, #1e40af, #7c3aed);
            color: white;
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(37,99,235,0.3);
        }

        .score-card h2 { color: white; font-size: 2rem; margin-bottom: 0.5rem; }
        .score-card p  { opacity: 0.9; font-size: 1.1rem; margin: 0; }
    </style>
</head>

<body style="background: var(--primary-bg);">
    <header class="glass-header">
        <nav class="navbar" style="padding: 0.5rem 5%;">
            <div class="logo">
                🎓 Elite <span style="color:var(--brand-blue); margin-left:0.5rem;">Student Dashboard</span>
            </div>
            <div class="nav-links">
                <a href="#" class="btn btn-outline"
                    style="padding:0.4rem 1rem; border-radius:999px; margin-right: 0.5rem;"
                    onclick="toggleDarkMode()">🌓 Theme</a>
                <a href="#" class="btn btn-outline" style="padding:0.4rem 1rem; border-radius:999px;"
                    onclick="logout()">Logout</a>
            </div>
        </nav>
    </header>

    <div class="dashboard-container">
        <div class="sidebar">
            <ul>
                <li><a href="#" id="menu-home" class="active" onclick="loadSubjects()">My Subjects</a></li>
                <li><a href="#" id="menu-results" onclick="loadMyResults()">My Results</a></li>
            </ul>
        </div>
        <div class="main-content" id="main-content">
            <div id="dynamic-content"></div>
        </div>
    </div>

    <script src="/js/main.js"></script>
    <script>
        checkAuth();
        if (role !== 'student') {
            window.location.href = '/admin-dashboard.html';
        }

        const contentDiv = document.getElementById('dynamic-content');

        async function loadSubjects() {
            document.getElementById('menu-home').classList.add('active');
            document.getElementById('menu-results').classList.remove('active');
            contentDiv.innerHTML = '<p>Loading subjects...</p>';

            try {
                const urlParams = new URLSearchParams(window.location.search);
                const stdId = urlParams.get('std');
                const fetchUrl = stdId ? (API_URL + '/student/subjects?std=' + stdId) : (API_URL + '/student/subjects');
                const res = await fetchWithAuth(fetchUrl);
                if (res.success && res.data.length > 0) {
                    let html = `
                    <div class="welcome-banner">
                      <h2>Let's crush your goals today! 🎯</h2>
                      <p>Select a subject below to resume your learning journey.</p>
                    </div>
                    <h3 style="margin-top:1rem; font-size:1.6rem;">Your Subjects</h3>
                    <div class="cards-grid">`;
                    const icons = ['📚', '📐', '🧪', '🌎', '💻', '🎨'];
                    res.data.forEach((sub, i) => {
                        let icon = icons[i % icons.length];
                        html += `
              <div class="student-subject-card" style="cursor:pointer;" onclick="loadChapters('${sub._id}', '${sub.name}')">
                <div class="card-gradient-top"></div>
                <div class="subject-icon">${icon}</div>
                <h3 style="color:var(--text-dark);">${sub.name}</h3>
                <p style="color:var(--text-gray); font-size:0.9rem;">Click to explore chapters</p>
              </div>
            `;
                    });
                    html += '</div>';
                    contentDiv.innerHTML = html;
                } else {
                    contentDiv.innerHTML = '<p>No subjects found for your standard.</p>';
                }
            } catch (err) {
                contentDiv.innerHTML = '<p class="error-msg">Error loading subjects</p>';
            }
        }

        async function loadChapters(subjectId, subjectName) {
            contentDiv.innerHTML = `<div class="back-nav" onclick="loadSubjects()">← Back to Subjects</div>
      <h2 style="font-size:2rem;">${subjectName} <span style="font-weight:400; color:var(--text-gray);">/ Chapters</span></h2>
      <p>Loading chapters...</p>`;

            try {
                const res = await fetchWithAuth(API_URL + '/student/subjects/' + subjectId + '/chapters');
                if (res.success && res.data.length > 0) {
                    let html = '<div style="margin-top:2rem;">';
                    res.data.forEach((chap, idx) => {
                        html += `
              <div class="chapter-card" onclick="loadContent('${chap._id}', '${chap.title}', '${subjectId}', '${subjectName}')">
                <div class="chapter-number">${idx + 1}</div>
                <div style="flex:1;">
                  <h3 style="color:var(--text-dark); margin:0; font-size:1.2rem;">${chap.title}</h3>
                  <p style="color:var(--text-gray); margin:0; font-size:0.9rem; margin-top:0.3rem;">Video • PDF Notes • MCQ Test</p>
                </div>
                <div style="color:var(--brand-blue); font-size:1.5rem;">➔</div>
              </div>
            `;
                    });
                    html += '</div>';
                    contentDiv.innerHTML = `<div class="back-nav" onclick="loadSubjects()">← Back to Subjects</div>
          <h2 style="font-size:2rem;">${subjectName} <span style="font-weight:400; color:var(--text-gray);">/ Chapters</span></h2>` + html;
                } else {
                    contentDiv.innerHTML = `<div class="back-nav" onclick="loadSubjects()">← Back to Subjects</div>
          <h2 style="font-size:2rem;">${subjectName} <span style="font-weight:400; color:var(--text-gray);">/ Chapters</span></h2>
          <p style="margin-top:2rem;">No chapters available yet.</p>`;
                }
            } catch (err) {
                contentDiv.innerHTML += '<p class="error-msg">Error loading chapters.</p>';
            }
        }

        let currentMCQs = [];
        let currentChapterId = '';

        async function loadContent(chapterId, chapterTitle, subjectId, subjectName) {
            contentDiv.innerHTML = `<div class="back-nav" onclick="loadChapters('${subjectId}', '${subjectName}')">← Back to Chapters</div>
      <h2 style="font-size:2.2rem; margin-bottom: 2rem;">${chapterTitle}</h2>
      <p>Loading content...</p>`;

            try {
                const res = await fetchWithAuth(API_URL + '/student/chapters/' + chapterId + '/content');
                if (res.success) {
                    const { videos, notes, mcqs } = res.data;
                    currentMCQs = mcqs;
                    currentChapterId = chapterId;

                    let html = '';

                    if (videos.length > 0) {
                        html += `<div class="content-section">
                          <div class="content-header">
                            <span class="content-icon">🎬</span><h4>Video Lectures</h4>
                          </div>
                          <div class="cards-grid" style="margin-top:0;">`;
                        videos.forEach((v, vIdx) => {
                            const vidId = getYouTubeId(v.url);
                            const thumb = vidId
                                ? `https://img.youtube.com/vi/${vidId}/hqdefault.jpg`
                                : '';
                            const cardId = `vid-card-${vIdx}`;
                            if (thumb) {
                                html += `
                                <div class="video-thumb-card" id="${cardId}" onclick="playVideo('${cardId}', '${v.url}')"> 
                                  <div class="video-thumb-wrap">
                                    <img src="${thumb}" alt="${v.title} thumbnail" loading="lazy">
                                    <div class="play-btn-overlay">
                                      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M8 5v14l11-7z"/></svg>
                                    </div>
                                  </div>
                                  <div class="video-thumb-info">
                                    <h5>${v.title}</h5>
                                    <span>🎬 Click to play video</span>
                                  </div>
                                </div>`;
                            } else {
                                html += `<div class="card" style="padding:1rem;">
                                  <h5 style="margin-bottom:1rem; font-size:1.1rem; color:var(--text-dark);">${v.title}</h5>
                                  <iframe width="100%" height="220" src="${v.url}" frameborder="0" allowfullscreen style="border-radius:12px;"></iframe>
                                </div>`;
                            }
                        });
                        html += `</div></div>`;
                    }

                    if (notes.length > 0) {
                        html += `<div class="content-section">
                          <div class="content-header">
                            <span class="content-icon">📚</span><h4>PDF Study Notes</h4>
                          </div>
                          <ul style="list-style:none; padding:0;">`;
                        notes.forEach(n => {
                            html += `<li style="margin-bottom:1rem;">
                              <a href="${n.fileUrl}" target="_blank" style="display:flex; align-items:center; padding:1.2rem; background:var(--primary-bg); border-radius:12px; font-weight:600; font-size:1.1rem; border:1px solid var(--border);">
                                <span style="margin-right:1rem; font-size:1.5rem;">📥</span> ${n.title}
                              </a>
                            </li>`;
                        });
                        html += `</ul></div>`;
                    }

                    if (mcqs.length > 0) {
                        html += `<div class="content-section" id="quiz-container">
                          <div class="content-header">
                            <span class="content-icon">🏆</span><h4>Chapter Test</h4>
                          </div>
              <form id="quizForm" onsubmit="submitQuiz(event)">`;

                        mcqs.forEach((q, index) => {
                            html += `<div class="question-block" style="margin-bottom:2rem;">
                <h4 style="font-size:1.2rem; font-weight:600; margin-bottom:1rem; color:var(--brand-dark);">Q${index + 1}. ${q.question}</h4>
                <div class="options">`;
                            q.options.forEach((opt, oIdx) => {
                                html += `<label class="test-option"><input type="radio" name="q${index}" value="${opt}" required> ${opt}</label>`;
                            });
                            html += `</div></div>`;
                        });

                        html += `<button type="submit" class="fancy-test-btn">Submit Test & Get Score ➔</button>
              </form>
              <div id="quiz-result" style="margin-top:1.5rem; font-weight:800; font-size:1.5rem;"></div>
            </div>`;
                    } else {
                        html += `<div class="content-section"><p>No test available for this chapter.</p></div>`;
                    }

                    contentDiv.innerHTML = `<div class="back-nav" onclick="loadChapters('${subjectId}', '${subjectName}')">← Back to Chapters</div>
          <h2 style="font-size:2.2rem; margin-bottom: 2rem;">${chapterTitle}</h2>` + html;
                }
            } catch (err) {
                contentDiv.innerHTML += '<p class="error-msg">Error loading content.</p>';
            }
        }

        async function submitQuiz(e) {
            e.preventDefault();
            let score = 0;
            const formData = new FormData(e.target);

            // Collect all selected answers first
            const userAnswers = currentMCQs.map((q, index) => formData.get('q' + index));

            // Calculate score
            currentMCQs.forEach((q, index) => {
                if (userAnswers[index] === q.correctAnswer) score++;
            });

            const percentage = Math.round((score / currentMCQs.length) * 100);
            const emoji = percentage >= 80 ? '🏆' : percentage >= 50 ? '👍' : '📖';
            const message = percentage >= 80 ? 'Excellent Work!' : percentage >= 50 ? 'Good Effort!' : 'Keep Practising!';

            // Build detailed review HTML
            let reviewHTML = `
                <div class="score-card">
                    <h2>${emoji} ${score} / ${currentMCQs.length}</h2>
                    <p>${message} &nbsp;•&nbsp; ${percentage}% correct</p>
                </div>
                <h3 style="margin-bottom:1.5rem; font-size:1.4rem;">📋 Detailed Review</h3>
            `;

            currentMCQs.forEach((q, index) => {
                const selected = userAnswers[index];
                const isCorrect = selected === q.correctAnswer;
                const blockClass = isCorrect ? 'correct-block' : 'wrong-block';
                const badgeClass = isCorrect ? 'badge-correct' : 'badge-wrong';
                const badgeText = isCorrect ? '✔ Correct' : '✘ Wrong';

                reviewHTML += `
                <div class="question-block ${blockClass}" style="margin-bottom:1.5rem;">
                    <span class="q-status-badge ${badgeClass}">${badgeText}</span>
                    <h4 style="font-size:1.1rem; font-weight:600; margin-bottom:1rem; color:var(--brand-dark);">Q${index + 1}. ${q.question}</h4>
                    <div class="options">
                `;

                q.options.forEach(opt => {
                    let optClass = 'neutral';
                    let icon = '';
                    if (opt === q.correctAnswer) {
                        optClass = 'correct-answer';
                        icon = ' ✔';
                    } else if (opt === selected && !isCorrect) {
                        optClass = 'wrong-answer';
                        icon = ' ✘';
                    }
                    reviewHTML += `<span class="result-option ${optClass}">${opt}${icon}</span>`;
                });

                if (!isCorrect) {
                    reviewHTML += `<p style="margin-top:0.8rem; font-size:0.9rem; color:#15803d; font-weight:600;">💡 Correct Answer: ${q.correctAnswer}</p>`;
                }

                reviewHTML += `</div></div>`;
            });

            // Replace the form with the review
            const quizContainer = document.getElementById('quiz-container');
            quizContainer.innerHTML = `
                <div class="content-header">
                    <span class="content-icon">🏆</span><h4>Test Result</h4>
                </div>
                ${reviewHTML}
            `;
            quizContainer.scrollIntoView({ behavior: 'smooth' });

            // Save result to DB
            try {
                await fetchWithAuth(API_URL + '/student/results', {
                    method: 'POST',
                    body: JSON.stringify({
                        chapterId: currentChapterId,
                        score,
                        total: currentMCQs.length
                    })
                });
            } catch (err) {
                console.error('Failed to save result:', err);
            }
        }

        async function loadMyResults() {
            document.getElementById('menu-results').classList.add('active');
            document.getElementById('menu-home').classList.remove('active');
            contentDiv.innerHTML = '<h3 style="margin-top:1rem;">My Previous Results</h3><p>Loading...</p>';

            try {
                const res = await fetchWithAuth(API_URL + '/student/results');
                if (res.success && res.data.length > 0) {
                    let html = `<table><thead><tr><th>Date</th><th>Chapter</th><th>Score</th></tr></thead><tbody>`;
                    res.data.forEach(r => {
                        html += `<tr>
              <td data-label="Date">${new Date(r.createdAt).toLocaleDateString()}</td>
              <td data-label="Chapter">${r.chapter ? r.chapter.title : 'Deleted Chapter'}</td>
              <td data-label="Score">${r.score} / ${r.total}</td>
            </tr>`;
                    });
                    html += `</tbody></table>`;
                    contentDiv.innerHTML = `<h3 style="margin-top:1rem;">My Previous Results</h3>` + html;
                } else {
                    contentDiv.innerHTML = `<h3 style="margin-top:1rem;">My Previous Results</h3><p>No results found.</p>`;
                }
            } catch (err) {
                contentDiv.innerHTML += '<p class="error-msg">Error loading results.</p>';
            }
        }

        // Theme Mode functionality
        function toggleDarkMode() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            if (currentTheme === 'dark') {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
            }
        }
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }

        // Extract YouTube video ID from embed or short URLs
        function getYouTubeId(url) {
            if (!url) return null;
            const patterns = [
                /youtube\.com\/embed\/([^?&]+)/,
                /youtube\.com\/watch\?v=([^&]+)/,
                /youtu\.be\/([^?&]+)/
            ];
            for (const pattern of patterns) {
                const match = url.match(pattern);
                if (match) return match[1];
            }
            return null;
        }

        // Replace thumbnail card with live iframe player on click
        function playVideo(cardId, embedUrl) {
            const card = document.getElementById(cardId);
            if (!card) return;
            const title = card.querySelector('h5') ? card.querySelector('h5').innerText : 'Video Lecture';
            // Ensure autoplay by appending ?autoplay=1
            const autoUrl = embedUrl.includes('?') ? embedUrl + '&autoplay=1' : embedUrl + '?autoplay=1';
            card.outerHTML = `
                <div class="card" style="padding:1rem;">
                    <h5 style="margin-bottom:1rem; font-size:1.1rem; color:var(--text-dark);">${title}</h5>
                    <iframe width="100%" height="240" src="${autoUrl}" frameborder="0"
                        allow="autoplay; encrypted-media; fullscreen"
                        allowfullscreen style="border-radius:12px;"></iframe>
                </div>`;
        }

        // Load initial
        loadSubjects();
    </script>
</body>

</html>
