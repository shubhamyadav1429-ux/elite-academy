<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Elite Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Albert+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* Admin Dashboard Specific Styles */
        .admin-section {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            margin-bottom: 2rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            border: 1px solid var(--border);
        }

        .metric-card {
            background: linear-gradient(135deg, var(--brand-dark) 0%, var(--brand-blue) 100%);
            color: white;
            padding: 2rem;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
        }

        .metric-card h3 {
            color: rgba(255, 255, 255, 0.8) !important;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }

        .metric-card h1 {
            font-size: 3rem;
            margin: 0;
            color: white;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
        }

        .admin-form-card {
            background: var(--primary-bg);
            padding: 2rem;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.02);
        }

        .admin-form-card h4 {
            color: var(--brand-dark);
            font-size: 1.3rem;
            margin-bottom: 1.5rem;
            border-bottom: 3px solid var(--brand-blue);
            display: inline-block;
            padding-bottom: 0.5rem;
        }

        .admin-form-card input,
        .admin-form-card select {
            width: 100%;
            padding: 0.8rem 1rem;
            margin-bottom: 1rem;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: 0.95rem;
            background: white;
        }

        .admin-form-card input:focus,
        .admin-form-card select:focus {
            border-color: var(--brand-blue);
            outline: none;
        }

        .fancy-btn {
            background: var(--brand-blue);
            color: white;
            padding: 0.8rem;
            width: 100%;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
        }

        .fancy-btn:hover {
            background: var(--brand-dark);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }
    </style>
</head>

<body style="background: var(--primary-bg);">
    <header class="glass-header">
        <nav class="navbar" style="padding: 0.5rem 5%;">
            <div class="logo">
                🎓 Elite <span style="color:var(--brand-blue); margin-left:0.5rem;">Admin Panel</span>
            </div>
            <div class="nav-links">
                <a href="#" class="btn btn-outline"
                    style="padding:0.4rem 1rem; border-radius:999px; margin-right: 0.5rem;"
                    onclick="toggleDarkMode()">🌓 Theme</a>
                <a href="#" class="btn btn-outline" style="padding:0.4rem 1rem; border-radius:999px;"
                    onclick="logout()">Logout</a>
            </div>
        </nav>
    </header>

    <div class="dashboard-container">
        <div class="sidebar">
            <ul>
                <li><a href="#" id="menu-analytics" onclick="showAnalytics()" class="active">Analytics</a></li>
                <li><a href="#" id="menu-manage" onclick="showManage()">Manage Content</a></li>
                <li><a href="#" id="menu-students" onclick="showStudents()">Students & Scores</a></li>
            </ul>
        </div>
        <div class="main-content" id="admin-content">
            <h2 style="font-size:2.2rem; color:var(--brand-dark); margin-bottom: 2rem;">Admin Control Station</h2>
            <div id="dynamic-content"></div>
        </div>
    </div>

    <script src="/js/main.js"></script>
    <script>
        checkAdminAuth();

        const contentDiv = document.getElementById('dynamic-content');

        function setActiveMenu(id) {
            document.querySelectorAll('.sidebar ul li a').forEach(a => a.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        async function showAnalytics() {
            setActiveMenu('menu-analytics');
            contentDiv.innerHTML = '<p>Loading analytics...</p>';
            try {
                const res = await fetchWithAuth(API_URL + '/admin/analytics');
                if (res.success) {
                    contentDiv.innerHTML = `
            <div class="cards-grid">
              <div class="metric-card">
                <h3>Total Students</h3>
                <h1>${res.data.totalStudents}</h1>
              </div>
              <div class="metric-card">
                <h3>Total Subjects</h3>
                <h1>${res.data.totalSubjects}</h1>
              </div>
              <div class="metric-card">
                <h3>Total Tests Taken</h3>
                <h1>${res.data.totalTestsTaken}</h1>
              </div>
            </div>
          `;
                }
            } catch (err) {
                contentDiv.innerHTML = '<p class="error-msg">Error loading analytics</p>';
            }
        }

        async function showManage() {
            setActiveMenu('menu-manage');

            // A quick manage view. Ideally separate tabs. We'll do a simple form approach.
            contentDiv.innerHTML = `
        <div class="admin-section">
          <h3 style="margin-bottom: 1.5rem; color:var(--text-dark);">1. Core Structure Management</h3>
          <div class="form-grid">
            <div class="admin-form-card">
              <h4>Add Standard (Class)</h4>
              <form onsubmit="addStandard(event)">
                <input type="text" id="stdName" placeholder="e.g. 10th Standard" required>
                <button class="fancy-btn">Create Standard</button>
              </form>
            </div>
            <div class="admin-form-card">
              <h4>Add Subject</h4>
              <form onsubmit="addSubject(event)">
                <input type="text" id="subName" placeholder="Subject Name (e.g. Science)" required>
                <select id="subStd" required>
                  <option value="" disabled selected>Select Standard...</option>
                </select>
                <button class="fancy-btn">Create Subject</button>
              </form>
            </div>
            <div class="admin-form-card">
              <h4>Add Chapter</h4>
              <form onsubmit="addChapter(event)">
                <input type="text" id="chapName" placeholder="Chapter Title" required>
                <select id="chapSub" required>
                  <option value="" disabled selected>Select Subject...</option>
                </select>
                <button class="fancy-btn">Create Chapter</button>
              </form>
            </div>
          </div>
        </div>

        <div class="admin-section">
          <h3 style="margin-bottom: 1.5rem; color:var(--text-dark);">2. Educational Content (Materials)</h3>
          <div class="form-grid">
            <div class="admin-form-card">
              <h4>Add Video Lecture</h4>
              <form onsubmit="addVideo(event)">
                <input type="text" id="vidTitle" placeholder="Video Title" required>
                <input type="url" id="vidUrl" placeholder="YouTube Embed URL" required>
                <select id="vidStd" required onchange="filterChapters(this.value, 'vidChap')"><option value="" disabled selected>Select Standard...</option></select>
                <select id="vidChap" required><option value="" disabled selected>Select Standard First...</option></select>
                <button class="fancy-btn">Attach Video</button>
              </form>
            </div>
            <div class="admin-form-card">
              <h4>Upload PDF Notes</h4>
              <form onsubmit="addNote(event)" enctype="multipart/form-data">
                <input type="text" id="noteTitle" placeholder="Document Title" required>
                <input type="file" id="noteFile" accept=".pdf" required style="padding: 0.5rem; background:white;">
                <select id="noteStd" required onchange="filterChapters(this.value, 'noteChap')"><option value="" disabled selected>Select Standard...</option></select>
                <select id="noteChap" required><option value="" disabled selected>Select Standard First...</option></select>
                <button class="fancy-btn">Upload Document</button>
              </form>
            </div>
            <div class="admin-form-card" style="grid-column: 1 / -1;">
              <h4>Add MCQ Question</h4>
              <form onsubmit="addMCQ(event)" style="display:flex; flex-wrap:wrap; gap:1rem;">
                <div style="flex: 1 1 100%;"><input type="text" id="mcqQ" placeholder="Question Title" required></div>
                <div style="flex: 1 1 45%;"><input type="text" id="mcqO1" placeholder="Option 1" required></div>
                <div style="flex: 1 1 45%;"><input type="text" id="mcqO2" placeholder="Option 2" required></div>
                <div style="flex: 1 1 45%;"><input type="text" id="mcqO3" placeholder="Option 3" required></div>
                <div style="flex: 1 1 45%;"><input type="text" id="mcqO4" placeholder="Option 4" required></div>
                <div style="flex: 1 1 45%;"><input type="text" id="mcqAns" placeholder="Correct Answer (Exact Match)" required></div>
                <div style="flex: 1 1 45%;">
                   <select id="mcqStd" required style="margin-bottom:0;" onchange="filterChapters(this.value, 'mcqChap')"><option value="" disabled selected>Select Standard...</option></select>
                </div>
                <div style="flex: 1 1 45%;">
                   <select id="mcqChap" required style="margin-bottom:0;"><option value="" disabled selected>Select Standard First...</option></select>
                </div>
                <div style="flex: 1 1 100%;"><button class="fancy-btn" style="background:var(--success);">Add To Question Bank</button></div>
              </form>
            </div>
          </div>
        </div>

        <div class="admin-section" style="text-align:center;">
          <h3 style="margin-bottom:1rem;">Master Data Management</h3>
          <p style="margin-bottom:1.5rem; color:var(--text-gray);">View all structured elements and delete them if necessary.</p>
          <button class="fancy-btn" style="width:auto; padding: 1rem 3rem;" onclick="listAllContent()">View Added Data Grid</button>
        </div>
      `;

            // Load dropdowns
            loadDropdowns();
        }

        async function loadDropdowns() {
            const stdRes = await fetchWithAuth(API_URL + '/admin/standards');
            const subRes = await fetchWithAuth(API_URL + '/admin/subjects');
            const chapRes = await fetchWithAuth(API_URL + '/admin/chapters');

            window.allChapters = chapRes.success ? chapRes.data : [];

            const stdSelects = [
                document.getElementById('subStd'),
                document.getElementById('vidStd'),
                document.getElementById('noteStd'),
                document.getElementById('mcqStd')
            ];

            if (stdRes.success) {
                stdRes.data.forEach(s => {
                    stdSelects.forEach(sel => {
                        if (sel) sel.innerHTML += `<option value="${s._id}">${s.name}</option>`;
                    });
                });
            }

            const chapSubSelect = document.getElementById('chapSub');
            if (subRes.success) {
                subRes.data.forEach(s => { chapSubSelect.innerHTML += `<option value="${s._id}">${s.name} (${s.standard ? s.standard.name : 'Unknown'})</option>`; });
            }
        }

        function filterChapters(stdId, targetChapId) {
            const targetSelect = document.getElementById(targetChapId);
            targetSelect.innerHTML = '<option value="" disabled selected>Select Chapter...</option>';
            if (!window.allChapters) return;

            const filtered = window.allChapters.filter(c => {
                if (!c.subject || !c.subject.standard) return false;
                const cStdId = c.subject.standard._id ? c.subject.standard._id : c.subject.standard;
                return cStdId.toString() === stdId.toString();
            });

            if (filtered.length === 0) {
                targetSelect.innerHTML = '<option value="" disabled selected>No chapters found for this standard!</option>';
            } else {
                filtered.forEach(c => {
                    targetSelect.innerHTML += `<option value="${c._id}">${c.title} (${c.subject.name})</option>`;
                });
            }
        }

        async function addStandard(e) {
            e.preventDefault();
            await fetchWithAuth(API_URL + '/admin/standards', { method: 'POST', body: JSON.stringify({ name: document.getElementById('stdName').value }) });
            alert('Standard Added!'); showManage();
        }

        async function addSubject(e) {
            e.preventDefault();
            await fetchWithAuth(API_URL + '/admin/subjects', { method: 'POST', body: JSON.stringify({ name: document.getElementById('subName').value, standard: document.getElementById('subStd').value }) });
            alert('Subject Added!'); showManage();
        }

        async function addChapter(e) {
            e.preventDefault();
            await fetchWithAuth(API_URL + '/admin/chapters', { method: 'POST', body: JSON.stringify({ title: document.getElementById('chapName').value, subject: document.getElementById('chapSub').value }) });
            alert('Chapter Added!'); showManage();
        }

        async function addVideo(e) {
            e.preventDefault();
            await fetchWithAuth(API_URL + '/admin/videos', {
                method: 'POST', body: JSON.stringify({
                    title: document.getElementById('vidTitle').value,
                    url: document.getElementById('vidUrl').value,
                    chapter: document.getElementById('vidChap').value
                })
            });
            alert('Video Attached Successfully!'); showManage();
        }

        async function addNote(e) {
            e.preventDefault();
            const formData = new FormData();
            formData.append('title', document.getElementById('noteTitle').value);
            formData.append('file', document.getElementById('noteFile').files[0]);
            formData.append('chapter', document.getElementById('noteChap').value);

            await fetchWithAuth(API_URL + '/admin/notes', { method: 'POST', body: formData });
            alert('PDF Uploaded Successfully!'); showManage();
        }

        async function addMCQ(e) {
            e.preventDefault();
            const payload = {
                question: document.getElementById('mcqQ').value,
                options: [
                    document.getElementById('mcqO1').value,
                    document.getElementById('mcqO2').value,
                    document.getElementById('mcqO3').value,
                    document.getElementById('mcqO4').value
                ],
                correctAnswer: document.getElementById('mcqAns').value,
                chapter: document.getElementById('mcqChap').value
            };
            await fetchWithAuth(API_URL + '/admin/mcqs', { method: 'POST', body: JSON.stringify(payload) });
            alert('MCQ Added Successfully!'); showManage();
        }

        async function listAllContent() {
            // Just showing standards here as an example for brevity. In a full app, we'd list all with delete buttons.
            const stdRes = await fetchWithAuth(API_URL + '/admin/standards');
            let html = `<button class="btn" onclick="showManage()">Back To Manage</button><h3>Standard List</h3>`;
            if (stdRes.success) {
                html += `<ul>`;
                stdRes.data.forEach(s => {
                    html += `<li>${s.name} <button onclick="delStandard('${s._id}')" style="color:red; margin-left:1rem; cursor:pointer;">Del</button></li>`;
                });
                html += `</ul>`;
            }
            contentDiv.innerHTML = html;
        }

        async function delStandard(id) {
            if (confirm('Delete standard?')) {
                await fetchWithAuth(API_URL + '/admin/standards/' + id, { method: 'DELETE' });
                listAllContent();
            }
        }

        async function showStudents() {
            setActiveMenu('menu-students');
            contentDiv.innerHTML = '<p>Loading students and scores...</p>';
            try {
                const stdRes = await fetchWithAuth(API_URL + '/admin/students');
                const resRes = await fetchWithAuth(API_URL + '/admin/results');

                let html = '<div class="admin-section"><h3 style="margin-bottom:1.5rem; color:var(--text-dark);">Registered Students</h3><div style="overflow-x:auto;"><table><tr><th>Name</th><th>Email</th><th>Standard</th></tr>';
                if (stdRes.success) {
                    stdRes.data.forEach(s => {
                        html += `<tr><td><strong>${s.name}</strong></td><td>${s.email}</td><td><span class="badge" style="margin:0;">${s.standard ? s.standard.name : 'Unknown'}</span></td></tr>`;
                    });
                }
                html += '</table></div></div>';

                html += '<div class="admin-section"><h3 style="margin-bottom:1.5rem; color:var(--text-dark);">All Quiz Results</h3><div style="overflow-x:auto;"><table><tr><th>Student Name</th><th>Chapter</th><th>Score</th><th>Performance</th></tr>';
                if (resRes.success) {
                    resRes.data.forEach(r => {
                        let perfColor = r.score > r.total / 2 ? 'var(--success)' : 'var(--danger)';
                        html += `<tr>
              <td><strong>${r.student ? r.student.name : 'Unknown'}</strong></td>
              <td>${r.chapter ? r.chapter.title : 'Deleted Chapter'}</td>
              <td><strong style="color:${perfColor}">${r.score} / ${r.total}</strong></td>
              <td>
                <div style="width:100%; height:8px; background:var(--border); border-radius:4px; overflow:hidden;">
                    <div style="height:100%; background:${perfColor}; width:${(r.score / r.total) * 100}%;"></div>
                </div>
              </td>
            </tr>`;
                    });
                }
                html += '</table></div></div>';

                contentDiv.innerHTML = html;
            } catch (err) {
                contentDiv.innerHTML = '<p class="error-msg">Error loading data.</p>';
            }
        }

        function toggleDarkMode() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            if (currentTheme === 'dark') {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
            }
        }

        // Initialize Theme Mode
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }

        showAnalytics();
    </script>
</body>

</html>
